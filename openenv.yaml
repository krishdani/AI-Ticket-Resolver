spec_version: 1
type: space
runtime: fastapi
name: ai_customer_support_resolver
version: 1.1.0
description: >
  Hugging Face Space hosting an OpenEnv environment for training customer support agents.
  Levels scale from simple spam triage (Easy) to complex replacement workflows (Hard).

tasks:
  - id: easy_spam_case
    name: Easy — Spam Triage
    difficulty: easy
    grader: env.grader.grade_trajectory
    description: Identify and close a spam ticket in one step.

  - id: medium_refund
    name: Medium — Refund Approval
    difficulty: medium
    grader: env.grader.grade_trajectory
    description: Classify a broken item claim and issue a refund.

  - id: hard_complex_replacement
    name: Hard — Multi-step Replacement
    difficulty: hard
    grader: env.grader.grade_trajectory
    description: Classify, request missing model details, and then issue a replacement.

action_schema:
  type: object
  properties:
    action_type:
      type: string
      enum:
        - classify_issue
        - request_more_info
        - offer_refund
        - offer_replacement
        - escalate
        - close_ticket
    payload:
      type: string
      nullable: true
  required:
    - action_type

observation_schema:
  type: object
  properties:
    ticket_id:       { type: string }
    ticket_text:     { type: string }
    customer_history:{ type: string }
    current_step:    { type: integer }
    status:
      type: string
      enum: [open, classified, info_requested, resolved, closed, escalated]
    issue_category:  { type: string, nullable: true }
    history:         { type: array }

reward_range: [-1.0, 1.0]
score_range:  [0.0, 1.0]
max_steps: 8

endpoints:
  reset: POST /reset
  step:  POST /step
  state: GET  /state
  health: GET /health

app: app:app
port: 7860
