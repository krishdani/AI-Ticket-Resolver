spec_version: 1
type: space
runtime: fastapi
name: ai_customer_support_resolver
version: 1.1.0
description: >
  Professional RL environment for customer support ticket resolution.
  Features 3 tasks with increasing difficulty (1-4 steps) and multi-signal rewards.

tasks:
  - id: easy_spam
    name: Easy — Spam Filtering
    difficulty: easy
    grader: env.grader.grade_trajectory
    description: Handle incoming spam messages efficiently.

  - id: medium_refund
    name: Medium — Refund Request
    difficulty: medium
    grader: env.grader.grade_trajectory
    description: Process a standard refund for an empty package.

  - id: hard_damaged_replacement
    name: Hard — Complex Replacement
    difficulty: hard
    grader: env.grader.grade_trajectory
    description: High-value replacement for a VIP customer with damaged tech.

action_schema:
  type: object
  properties:
    action_type:
      type: string
      enum:
        - classify_issue
        - request_more_info
        - offer_refund
        - offer_replacement
        - escalate
        - close_ticket
    payload:
      type: string
      nullable: true
  required:
    - action_type

observation_schema:
  type: object
  properties:
    ticket_id:       { type: string }
    ticket_text:     { type: string }
    customer_history:{ type: string }
    current_step:    { type: integer }
    status:
      type: string
      enum: [open, classified, resolved, closed, escalated]
    issue_category:  { type: string, nullable: true }
    history:         { type: array }

reward_range: [-1.0, 1.0]
score_range:  [0.0, 1.0]
max_steps: 8

endpoints:
  reset: POST /reset
  step:  POST /step
  state: GET  /state
  health: GET /health

app: app:app
port: 7860
