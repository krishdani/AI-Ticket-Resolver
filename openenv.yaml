spec_version: 1
type: space
runtime: fastapi
name: ai_customer_support_resolver
version: 1.2.0
description: >
  Professional RL environment for customer support ticket resolution.
  Features a sequential "Stage-Based" workflow and high-fidelity Gradio UI.

tasks:
  - id: easy_spam_filter
    name: Easy — Spam Detection
    difficulty: easy
    grader: env.grader.grade_trajectory
    description: Identify the ticket as spam in a single step.

  - id: medium_refund
    name: Medium — Standard Refund
    difficulty: medium
    grader: env.grader.grade_trajectory
    description: Classify as refund and process. Two-step reasoning.

  - id: hard_damaged_replacement
    name: Hard — Complex Replacement
    difficulty: hard
    grader: env.grader.grade_trajectory
    description: VIP replacement requiring classification, info verification, and resolution. Four-step reasoning.

action_schema:
  type: object
  properties:
    action_type:
      type: string
      enum:
        - classify_issue
        - request_more_info
        - offer_refund
        - offer_replacement
        - escalate
        - close_ticket
    payload:
      type: string
      nullable: true
  required:
    - action_type

observation_schema:
  type: object
  properties:
    ticket_id:       { type: string }
    ticket_text:     { type: string }
    customer_history:{ type: string }
    current_step:    { type: integer }
    status:
      type: string
      enum: [OPEN, CLASSIFIED, VALIDATED, RESOLVED, CLOSED, ESCALATED]
    issue_category:  { type: string, nullable: true }
    history:         { type: array }

reward_range: [-1.0, 1.0]
score_range:  [0.0, 1.0]
max_steps: 8

endpoints:
  reset: POST /reset
  step:  POST /step
  state: GET  /state
  health: GET /health

app: app:app
port: 7860
