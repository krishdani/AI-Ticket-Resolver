<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Support Resolver | OpenEnv RL Environment</title>
  <meta name="description" content="Reinforcement Learning environment for AI-powered customer support ticket resolution." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0b10;
      --surface: #12141c;
      --surface2: #1a1d28;
      --border: #252836;
      --primary: #6c63ff;
      --primary-dim: #4e47cc;
      --accent: #00d4aa;
      --warn: #ff6b6b;
      --gold: #ffd166;
      --text: #e8eaf0;
      --text-muted: #6b7280;
      --success: #10b981;
      --radius: 14px;
      --glow: 0 0 24px rgba(108,99,255,.25);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    header {
      background: rgba(13, 15, 26, 0.8);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 100;
    }

    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; box-shadow: var(--glow);
    }

    .header-badge {
      font-size: 0.7rem; font-weight: 600; padding: 4px 10px;
      border-radius: 20px; background: rgba(108,99,255,.1);
      border: 1px solid rgba(108,99,255,.3); color: var(--primary);
    }

    .queue-badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: .75rem; font-weight: 700; color: var(--accent);
      background: rgba(0,212,170,.1); padding: 4px 12px;
      border-radius: 20px; border: 1px solid rgba(0,212,170,.2);
    }

    .task-bar {
      padding: 12px 32px; background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
    }

    .task-btn {
      padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--text-muted);
      font-size: .85rem; font-weight: 600; cursor: pointer; transition: all .2s;
    }
    .task-btn:hover { border-color: var(--primary); color: #fff; }
    .task-btn.active { border-color: var(--primary); background: rgba(108,99,255,0.1); color: var(--primary); }

    .main {
      flex: 1; display: grid; grid-template-columns: 1fr 380px;
      height: calc(100vh - 120px); overflow: hidden;
    }

    .panel { padding: 24px 32px; overflow-y: auto; }
    .left-panel { border-right: 1px solid var(--border); }
    .right-panel { background: var(--surface); }

    .section-label {
      font-size: .7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .1em; color: var(--text-muted); margin-bottom: 10px;
    }

    .ticket-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 24px; margin-bottom: 24px;
      position: relative; border-left: 4px solid var(--primary);
    }

    .status-pill {
      font-size: .65rem; font-weight: 800; text-transform: uppercase;
      padding: 3px 10px; border-radius: 20px;
    }
    .status-open { background: rgba(108,99,255,0.1); color: var(--primary); }
    .status-classified { background: rgba(255,209,102,0.1); color: var(--gold); }
    .status-resolved { background: rgba(16,185,129,0.1); color: var(--success); }

    .priority-pill { font-size: .6rem; font-weight: 900; padding: 2px 6px; border-radius: 4px; margin-left:8px; border:1px solid currentColor; }

    .step-log {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; padding: 16px; min-height: 150px; font-family: 'JetBrains Mono', monospace;
    }
    .step-item { font-size: .8rem; margin-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px; }

    .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 16px; }
    .act-btn {
      padding: 12px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--text); font-weight: 600;
      font-size: .8rem; cursor: pointer; transition: 0.2s;
    }
    .act-btn:hover { border-color: var(--primary); background: rgba(108,99,255,0.1); }
    .act-btn.primary { background: var(--primary); color: #fff; border: none; grid-column: span 2; }

    .payload-input {
      width: 100%; padding: 12px; border-radius: 8px; background: var(--surface2);
      border: 1px solid var(--border); color: #fff; outline: none; margin-bottom: 16px;
    }

    .modal-overlay {
      display: none; position: fixed; top:0; left:0; width:100%; height:100%;
      background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 1000;
      align-items: center; justify-content: center;
    }
    .modal {
      background: var(--surface); padding: 32px; border-radius: 20px;
      width: 100%; max-width: 450px; border: 1px solid var(--border);
    }
    .modal h2 { margin-bottom: 20px; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-size: .8rem; margin-bottom: 5px; color: var(--text-muted); }

    .reward-box {
      margin-top: 20px; padding: 16px; border-radius: 12px;
      border: 1px solid var(--border); display: none;
    }
    .reward-val { font-size: 1.5rem; font-weight: 800; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🎫</div>
    <div>
      <h2 style="font-size: 1.1rem; font-weight: 800;">AI Support Resolver</h2>
      <p style="font-size: 0.65rem; color: var(--text-muted);">OpenEnv Dispatch Engine</p>
    </div>
  </div>
  <div style="display:flex; align-items:center; gap:16px;">
    <div id="queueCounter" class="queue-badge" style="display:none;">
      <span>📦</span> <span id="queueSize">0</span> in Queue
    </div>
    <button class="task-btn" style="background:var(--primary); color:#fff; border:none;" onclick="openModal()">➕ Raise Ticket</button>
  </div>
</header>

<div class="task-bar">
  <label style="font-size: .7rem; font-weight: 700; color: var(--text-muted);">SESSION:</label>
  <button id="btn-easy" class="task-btn active" onclick="resetEnv('easy_refund', this)">Easy Session</button>
  <button id="btn-medium" class="task-btn" onclick="resetEnv('medium_replacement', this)">Medium Session</button>
  <button id="btn-hard" class="task-btn" onclick="resetEnv('hard_delay_case', this)">Hard Session</button>
</div>

<div class="main">
  <div class="panel left-panel">
    <div style="display:flex; justify-content:space-between; align-items:center;">
       <div class="section-label">Active Ticket</div>
       <span id="ticketPrio" class="priority-pill" style="color:var(--gold); border-color:var(--gold);">Medium</span>
    </div>
    
    <div class="ticket-card">
      <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
        <span id="ticketId" style="font-family:monospace; font-size:.8rem; color:var(--text-muted);">ID: --------</span>
        <span id="statusBadge" class="status-pill status-open">open</span>
      </div>
      <div id="ticketText" style="font-size:.95rem; line-height:1.6; margin-bottom:16px;">Loading ticket...</div>
      <div style="border-top:1px solid var(--border); padding-top:12px; font-size:.8rem; color:var(--text-muted);">
        👤 History: <span id="customerHistory">—</span>
      </div>
    </div>

    <div class="section-label">Processing Logs</div>
    <div id="stepLog" class="step-log"></div>
  </div>

  <div class="panel right-panel">
    <div class="section-label">Classification</div>
    <input id="actionPayload" class="payload-input" placeholder="Enter Label (e.g. refund)" />
    <div id="currentLabel" style="font-size:.7rem; color:var(--accent); font-weight:700; margin-bottom:20px; display:none;">
      IDENTITY: <span id="labelVal"></span>
    </div>

    <div class="section-label">Actions</div>
    <div class="action-grid">
      <button class="act-btn" onclick="takeAction('classify_issue')">🏷️ Classify</button>
      <button class="act-btn" onclick="takeAction('request_more_info')">❓ Request Info</button>
      <button class="act-btn" onclick="takeAction('offer_refund')">💰 Refund</button>
      <button class="act-btn" onclick="takeAction('offer_replacement')">📦 Replace</button>
      <button class="act-btn" style="border-color:var(--warn); color:var(--warn);" onclick="takeAction('escalate')">⬆️ Escalate</button>
      <button class="act-btn primary" onclick="takeAction('close_ticket')">✅ Resolve & Next</button>
    </div>

    <div id="rewardBox" class="reward-box">
      <div id="rewardVal" class="reward-val">+0.00</div>
      <div id="rewardReason" style="font-size:.8rem; color:var(--text-muted);">Reasoning...</div>
    </div>

    <div id="finalScore" style="display:none; margin-top:30px; text-align:center;">
       <div class="section-label">Session Grade</div>
       <div id="scoreValue" style="font-size:3rem; font-weight:900; color:var(--primary);">0.00</div>
       <button class="task-btn" style="margin-top:15px; width:100%;" onclick="location.reload()">New Session</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>Raise New Ticket</h2>
    <div class="form-group">
      <label>Subject</label>
      <input id="newSubject" class="payload-input" style="margin-bottom:0;" />
    </div>
    <div class="form-group">
      <label>Priority</label>
      <select id="newPriority" class="payload-input" style="margin-bottom:0;">
        <option value="low">Low</option>
        <option value="medium" selected>Medium</option>
        <option value="high">High</option>
      </select>
    </div>
    <div class="form-group">
      <label>Issue Type</label>
      <select id="newCategory" class="payload-input" style="margin-bottom:0;">
        <option value="refund">Refund</option>
        <option value="replacement">Replacement</option>
        <option value="shipping_delay">Shipping Delay</option>
      </select>
    </div>
    <button class="act-btn primary" onclick="submitTicket()">Submit to Engine</button>
    <button class="act-btn" style="width:100%; margin-top:8px;" onclick="closeModal()">Cancel</button>
  </div>
</div>

<script>
  let sessionId = null;
  function openModal() { document.getElementById('modal').style.display = 'flex'; }
  function closeModal() { document.getElementById('modal').style.display = 'none'; }

  async function submitTicket() {
    const payload = {
      session_id: sessionId,
      subject: document.getElementById('newSubject').value,
      body: "User created ticket.",
      customer_history: "N/A",
      priority: document.getElementById('newPriority').value,
      category: document.getElementById('newCategory').value
    };
    const res = await fetch('/raise_ticket', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)});
    const data = await res.json();
    updateQueueDisplay(data.queue_size);
    closeModal();
  }

  function updateQueueDisplay(size) {
    const badge = document.getElementById('queueCounter');
    if (size > 0) {
      badge.style.display = 'flex';
      document.getElementById('queueSize').textContent = size;
    } else badge.style.display = 'none';
  }

  async function resetEnv(taskId, btn) {
    document.querySelectorAll('.task-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const res = await fetch('/reset', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({task_id: taskId})});
    const data = await res.json();
    sessionId = data.session_id;
    updateTicket(data.state);
    document.getElementById('stepLog').innerHTML = '';
    document.getElementById('rewardBox').style.display = 'none';
    document.getElementById('finalScore').style.display = 'none';
  }

  async function takeAction(type) {
    const payload = document.getElementById('actionPayload').value;
    const res = await fetch('/step', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({session_id: sessionId, action: {action_type: type, payload}})});
    const data = await res.json();
    updateTicket(data.state);
    appendLog(type, payload, data.reward);
    showReward(data.reward);
    if (data.done) showScore(data.score);
    document.getElementById('actionPayload').value = '';
  }

  function updateTicket(state) {
    if (!state) return;
    document.getElementById('ticketId').textContent = "ID: " + state.ticket_id;
    document.getElementById('ticketText').textContent = state.ticket_text;
    document.getElementById('customerHistory').textContent = state.customer_history;
    const badge = document.getElementById('statusBadge');
    badge.textContent = state.status;
    badge.className = "status-pill status-" + state.status;
    const prio = document.getElementById('ticketPrio');
    prio.textContent = state.priority;
    const p = state.priority;
    prio.style.color = p == 'high' ? '#ff6b6b' : (p == 'low' ? '#6c63ff' : '#ffd166');
    prio.style.borderColor = prio.style.color;
    updateQueueDisplay(state.queue_remaining);
    if (state.issue_category) {
      document.getElementById('currentLabel').style.display = 'block';
      document.getElementById('labelVal').textContent = state.issue_category;
    } else document.getElementById('currentLabel').style.display = 'none';
  }

  function appendLog(action, payload, reward) {
    const log = document.getElementById('stepLog');
    const item = document.createElement('div');
    item.className = 'step-item';
    item.innerHTML = `<strong>${action}</strong> ${payload ? '→ ' + payload : ''} <span style="color:${reward.value >= 0 ? 'var(--success)' : 'var(--warn)'}">(${reward.value.toFixed(2)})</span>`;
    log.prepend(item);
  }

  function showReward(reward) {
    const box = document.getElementById('rewardBox');
    box.style.display = 'block';
    document.getElementById('rewardVal').textContent = (reward.value >= 0 ? '+' : '') + reward.value.toFixed(2);
    document.getElementById('rewardVal').style.color = reward.value >= 0 ? 'var(--success)' : 'var(--warn)';
    document.getElementById('rewardReason').textContent = reward.reason;
  }

  function showScore(score) {
    document.getElementById('finalScore').style.display = 'block';
    document.getElementById('scoreValue').textContent = score.toFixed(2);
  }

  window.onload = () => resetEnv('easy_refund', document.getElementById('btn-easy'));
</script>
</body>
</html>
